<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>circas</title>
<style>
/* ── shared foundation tokens (pasted, not imported) ── */
:root{
  --font: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", monospace;
  --bg:#0a0a0b; --panel:#141416; --line:#24242a;
  --fg:#e6e6e6; --dim:#6f6f78; --faint:#3a3a42;
  --acc:#3ddc84; --acc-dim:#1f6f47; --warn:#ff5c5c;
  --t-xl:2.25rem; --t-l:1.25rem; --t-m:1rem; --t-s:0.8125rem;
  --s1:4px; --s2:8px; --s3:16px; --s4:24px; --s5:48px;
  --radius:8px; --maxw:32rem;
}
*{ box-sizing:border-box; }
body{
  margin:0; background:var(--bg); color:var(--fg);
  font-family:var(--font); font-size:var(--t-m);
  text-transform:lowercase; line-height:1.5; letter-spacing:-0.01em;
  display:grid; place-items:start center; min-height:100dvh;
  padding:var(--s5) var(--s3);
}
main{ width:100%; max-width:var(--maxw); text-align:center; }
button{
  font:inherit; text-transform:lowercase; cursor:pointer;
  background:var(--panel); color:var(--fg);
  border:1px solid var(--line); border-radius:var(--radius);
  padding:var(--s2) var(--s3); transition:border-color .12s, color .12s;
}
button:hover{ border-color:var(--acc-dim); }
button:active{ transform:translateY(1px); }
button:disabled{ cursor:default; }
.dim{ color:var(--dim); }

/* ── circas ── */
.bar{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:var(--s5); }
.mark{ font-size:var(--t-l); }
.date{ font-size:var(--t-l); margin-bottom:var(--s4); }
.sun{ margin-bottom:var(--s5); }
#check{ width:100%; padding:var(--s4); font-size:var(--t-l); }
#check.done{ color:var(--acc); border-color:var(--acc-dim); }
.note{ min-height:1.4em; margin:var(--s4) 0 0; font-size:var(--t-s); }
.dots{ display:flex; gap:var(--s3); justify-content:center; margin:var(--s5) 0 var(--s4); }
.cell{ display:flex; flex-direction:column; align-items:center; gap:var(--s2); }
.dot{ width:14px; height:14px; border-radius:50%; border:1px solid var(--line); background:transparent; }
.dot.on{ background:var(--acc); border-color:var(--acc); }
.dot.today{ box-shadow:0 0 0 2px var(--acc-dim); }
.dot.today.on{ background:var(--acc); border-color:var(--acc); }
.lbl{ font-size:10px; }
.best{ font-size:var(--t-s); }
</style>
</head>
<body>
<main>
  <header class="bar"><span class="mark">circas</span><span class="dim">neoselfy</span></header>
  <div id="date" class="date">—</div>
  <div class="sun">
    <div id="sunrise">sunrise 05:41</div>
    <div class="dim">your four hours start here.</div>
  </div>
  <button id="check">did 4 hours of deep work</button>
  <p id="note" class="note dim"></p>
  <div id="dots" class="dots"></div>
  <p id="best" class="best dim"></p>
</main>
<script type="module">
const KEY = "circas";
const SUNRISE = "05:41"; // v0: hard-coded placeholder. edit for your city. real sunrise API is v1, on purpose.
const $ = s => document.querySelector(s);

function load(){
  try { return JSON.parse(localStorage.getItem(KEY)) || {v:1, handle:"neoselfy", days:{}}; }
  catch { return {v:1, handle:"neoselfy", days:{}}; }
}
const save = s => localStorage.setItem(KEY, JSON.stringify(s));
const state = load();

// local-time date key — NEVER utc. a streak that rolls over at utc midnight breaks in Toronto.
const keyOf = d => { const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };
const today = keyOf(new Date());

const DOW = ["sun","mon","tue","wed","thu","fri","sat"];
const MON = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
const fmtDate = d => `${DOW[d.getDay()]} ${MON[d.getMonth()]} ${d.getDate()}`;

// silent personal best — longest run of consecutive done-days. never shown as "current streak".
function bestRun(days){
  const keys = Object.keys(days).filter(k => days[k]).sort();
  let best = 0, run = 0, prev = null;
  for (const k of keys){
    if (prev){
      const gap = Math.round((new Date(k) - new Date(prev)) / 86400000);
      run = gap === 1 ? run + 1 : 1;
    } else run = 1;
    best = Math.max(best, run); prev = k;
  }
  return best;
}

function render(){
  $("#date").textContent    = fmtDate(new Date());
  $("#sunrise").textContent = `sunrise ${SUNRISE}`;

  const done = !!state.days[today];
  const btn  = $("#check");
  btn.textContent = done ? "logged. that's the day." : "did 4 hours of deep work";
  btn.classList.toggle("done", done);
  btn.disabled = done;                    // one-way latch, today only — no editing the past

  // rolling last-7 dots; a miss is just an absent date that scrolls off in a week
  const dots = $("#dots"); dots.innerHTML = "";
  for (let i = 6; i >= 0; i--){
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = keyOf(d);
    const cell = document.createElement("div"); cell.className = "cell";
    const dot  = document.createElement("div");
    dot.className = "dot" + (state.days[k] ? " on" : "") + (k === today ? " today" : "");
    const lbl  = document.createElement("div"); lbl.className = "lbl dim"; lbl.textContent = DOW[d.getDay()];
    cell.append(dot, lbl); dots.append(cell);
  }

  const best = bestRun(state.days);
  $("#best").textContent = best > 0 ? `best run so far · ${best} ${best === 1 ? "day" : "days"}` : "";

  // notes — hard rule: never scold. kinder on a miss than on a hit.
  const note = $("#note");
  const keys = Object.keys(state.days).filter(k => state.days[k]);
  const hasPast = keys.some(k => k !== today);
  const y = new Date(); y.setDate(y.getDate() - 1); const yk = keyOf(y);
  if (keys.length === 0)             note.textContent = "no dots yet. the first one's the whole game.";
  else if (hasPast && !state.days[yk]) note.textContent = "yesterday's gone. the sun came up again. so did you.";
  else                               note.textContent = "";
}

$("#check").addEventListener("click", () => {
  if (state.days[today]) return;
  state.days[today] = true;
  state.bestRun = bestRun(state.days);
  save(state);
  render();
});

render();
</script>
</body>
</html>
